<div [class]="esMini
    ? 'fixed bottom-6 right-6 w-80 h-60 z-[1000] rounded-xl overflow-hidden border-4 border-white shadow-2xl transition-all duration-500'
    : 'w-full h-full transition-all duration-500 relative'">

  <div id="mi-mapa" class="w-full h-full"></div>

  <button (click)="toggleMapa()"
    class="absolute top-3 right-3 z-[1100] bg-slate-800/80 hover:bg-slate-900 text-white p-2 rounded-lg backdrop-blur-sm transition-colors border border-white/20">
    <span class="text-xs font-bold">{{ esMini ? '🔳 Maximizar' : '🔲 Minimizar' }}</span>
  </button>
</div>
