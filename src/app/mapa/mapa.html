<div [class]="esMini
    ? 'fixed bottom-6 right-6 w-[500px] h-[350px] z-[1000] rounded-2xl overflow-hidden border-4 border-white shadow-[0_20px_50px_rgba(0,0,0,0.3)] transition-all duration-500'
    : 'w-full h-full transition-all duration-500 relative'">

  <div id="mi-mapa" class="w-full h-full"></div>

  <button (click)="toggleMapa()"
    class="absolute top-4 right-4 z-[1100] bg-slate-900/90 hover:bg-black text-white px-4 py-2 rounded-xl backdrop-blur-md transition-all border border-white/30 shadow-lg">
    <span class="text-sm font-bold">{{ esMini ? '🔳 Maximizar Mapa' : '🔲 Minimizar' }}</span>
  </button>
</div>
