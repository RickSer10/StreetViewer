<div class="flex h-screen w-full overflow-hidden bg-gray-100 font-sans">

  <app-sidebar class="flex-shrink-0 z-50 shadow-2xl"
    [tiempoActual]="tiempoActual"
    (videoSelected)="cargarVideoLocal($event)"
    (kmlSelected)="cargarKmlLocal($event)"
    (matrizGeneradaEvent)="dibujarMatrizEnMapa($event)"
    (buscarUtmEvent)="saltoVideoYMapa($event)">
  </app-sidebar>

  <div class="flex-1 relative h-full bg-black overflow-hidden flex flex-col">

    <button (click)="intercambiarVistas()" class="absolute top-4 right-4 z-[100] bg-black/70 hover:bg-black text-white px-5 py-2.5 rounded-xl backdrop-blur-sm border border-white/20 shadow-xl transition-all">
      <span class="text-[12px] font-bold tracking-wide">{{ mapaPrincipal ? '🎬 VER VIDEO PRINCIPAL' : '🗺️ MAXIMIZAR MAPA' }}</span>
    </button>

    <div [class]="mapaPrincipal
        ? 'absolute bottom-6 right-6 w-[450px] h-[300px] z-20 rounded-xl overflow-hidden border-4 border-gray-800 shadow-2xl transition-all duration-500 cursor-pointer group'
        : 'absolute inset-0 w-full h-full z-0 transition-all duration-500 flex flex-col justify-center'">

      <div *ngIf="!mapaPrincipal" class="absolute top-4 left-4 bg-black/80 text-white px-3 py-1.5 rounded-md shadow-lg z-20 flex items-center gap-2 font-mono text-[12px]">
        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
        <span class="font-bold text-gray-200">Tiempo: <span class="text-yellow-400">{{ tiempoActual }} s</span></span>
      </div>

      <video id="video360" class="w-full h-full object-cover" controls autoplay (timeupdate)="actualizarTiempo($event)" [src]="videoUrl">
        <source *ngIf="!videoUrl" src="assets/test_video.mp4" type="video/mp4">
      </video>

      <div *ngIf="mapaPrincipal" (click)="intercambiarVistas()" class="absolute inset-0 z-30 bg-black/10 hover:bg-black/40 flex items-center justify-center transition-all"></div>
    </div>

    <div [class]="!mapaPrincipal
        ? 'absolute bottom-6 right-6 w-[450px] h-[300px] z-20 rounded-xl overflow-hidden border-4 border-white shadow-2xl transition-all duration-500 cursor-pointer group'
        : 'absolute inset-0 w-full h-full z-0 transition-all duration-500'">

      <app-mapa class="w-full h-full block"></app-mapa>

      <div *ngIf="!mapaPrincipal" (click)="intercambiarVistas()" class="absolute inset-0 z-30 bg-white/10 hover:bg-black/10 flex items-center justify-center transition-all"></div>
    </div>

  </div>
</div>
