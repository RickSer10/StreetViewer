<div class="flex h-screen w-full overflow-hidden bg-slate-900">
  <app-sidebar [collapsed]="collapsed"></app-sidebar>

  <div class="flex-1 relative h-full bg-black">

    <div [ngClass]="esMini
        ? 'absolute inset-0 w-full h-full z-0 transition-all duration-500'
        : 'absolute top-0 left-0 w-full h-[70%] z-0 transition-all duration-500'">
      <video id="video360" class="absolute inset-0 w-full h-full object-cover" controls autoplay muted>
        <source src="assets/test_video.mp4" type="video/mp4">
      </video>

      <div class="absolute top-6 left-6 bg-blue-600/90 text-white px-4 py-2 rounded-xl text-xs font-bold shadow-2xl z-10 border border-white/20">
        MODO VIRTUAL 360° | {{ esMini ? 'PANTALLA COMPLETA' : 'ANÁLISIS DE RUTA' }}
      </div>
    </div>

    <div [class]="esMini
        ? 'fixed bottom-6 right-6 w-[500px] h-[350px] z-20 border-4 border-white rounded-3xl shadow-2xl overflow-hidden transition-all duration-500'
        : 'absolute bottom-0 left-0 w-full h-[30%] z-10 bg-slate-900 border-t-4 border-blue-600 transition-all duration-500'">

      <div *ngIf="!esMini" class="absolute top-0 left-0 w-full h-1 bg-blue-500 z-30 shadow-[0_0_15px_rgba(59,130,246,0.5)]"></div>

      <app-mapa></app-mapa>
    </div>

  </div>
</div>
