<div class="flex h-screen w-full overflow-hidden bg-gray-100 font-sans">

  <app-sidebar class="flex-shrink-0 z-50 shadow-2xl" [tiempoActual]="tiempoActual"
    (videoSelected)="cargarVideoLocal($event)" (kmlSelected)="cargarKmlLocal($event)"
    (matrizGeneradaEvent)="dibujarMatrizEnMapa($event)" (calibracionChanged)="onCalibracionChanged($event)"
    (buscarUtmEvent)="saltoVideoYMapa($event)">
  </app-sidebar>

  <div class="flex-1 relative h-full bg-black overflow-hidden flex flex-col">

    <!--<button (click)="intercambiarVistas()"
      class="absolute top-4 right-4 z-[100] bg-black/70 hover:bg-black text-white px-5 py-2.5 rounded-xl backdrop-blur-sm border border-white/20 shadow-xl transition-all">
      <span class="text-[12px] font-bold tracking-wide">{{ mapaPrincipal ? '🎬 VER VIDEO PRINCIPAL' : '🗺️ MAXIMIZAR
        MAPA' }}</span>
    </button>-->

    <div [class]="mapaPrincipal
        ? 'absolute bottom-6 right-6 w-[350px] h-[250px] z-20 rounded-xl overflow-hidden border-4 border-gray-800 shadow-2xl transition-all duration-500 cursor-pointer group'
        : 'absolute inset-0 w-full h-full z-0 transition-all duration-500 flex flex-col justify-center'">

      <div *ngIf="!mapaPrincipal"
        class="absolute top-4 left-4 bg-black/80 text-white px-3 py-1.5 rounded-md shadow-lg z-20 flex items-center gap-2 font-mono text-[12px]">
        <div class="w-2 h-2 bg-red-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></div>
        <span class="font-bold text-gray-200">Tiempo: <span class="text-yellow-400">{{ tiempoActual }} s</span></span>
      </div>

      <div *ngIf="!videoListo"
        class="w-full h-full flex flex-col items-center justify-center bg-gray-950 text-white select-none">
        <i class="pi pi-video text-6xl mb-4"></i>
        <h2 class="text-xl font-bold mb-2 tracking-wide">Sin video cargado</h2>
        <p class="text-gray-400 text-center text-sm">Carga un video 360° desde el panel lateral para comenzar</p>
      </div>

      <div #sphereContainer class="w-full h-full" [class.hidden]="!videoListo"></div>

      <button *ngIf="mapaPrincipal" (click)="intercambiarVistas()"
        class="absolute top-2 right-2 z-30 bg-black/70 hover:bg-black text-white text-[10px] px-2 py-1 rounded-md border border-white/20">
        Maximizar
      </button>
    </div>

    <div [class]="!mapaPrincipal
        ? 'absolute bottom-6 right-6 w-[350px] h-[250px] z-20 rounded-xl overflow-hidden border-4 border-white shadow-2xl transition-all duration-500 cursor-pointer group'
        : 'absolute inset-0 w-full h-full z-0 transition-all duration-500'">

      <app-mapa class="w-full h-full block"></app-mapa>

      <button *ngIf="!mapaPrincipal" (click)="intercambiarVistas()"
        class="absolute top-2 right-2 z-30 bg-white/85 hover:bg-white text-gray-800 text-[10px] px-2 py-1 rounded-md border border-gray-300">
        Maximizar
      </button>
    </div>

  </div>
</div>
